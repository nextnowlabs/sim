{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sim.fullname" . }}-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sim.nginx.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stdout info;

    events {
      worker_connections 1024;
    }

    http {
      access_log /dev/stdout;

      # WebSocket upgrade map
      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      # Optional real-IP from ELB/proxy chain
      {{- if .Values.nginx.realIpFrom }}
      set_real_ip_from {{ .Values.nginx.realIpFrom }};
      real_ip_header X-Forwarded-For;
      real_ip_recursive on;
      {{- end }}

      upstream app {
        server {{ include "sim.fullname" . }}-app:{{ .Values.app.service.port }};
      }

      upstream realtime {
        server {{ include "sim.fullname" . }}-realtime:{{ .Values.realtime.service.port }};
      }

      server {
        listen {{ .Values.nginx.service.targetPort }};

        {{- with .Values.nginx.extraServerConfig }}
        {{ . | nindent 8 }}
        {{- end }}

        # Health check
        location /nginx-health {
          access_log off;
          return 200 "ok";
        }

        # Realtime (WebSocket)
        location /socket.io {
          proxy_pass http://realtime;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 86400s;
        }

        # App (catch-all)
        location / {
          proxy_pass http://app;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 300s;
          proxy_buffering off;
          client_max_body_size {{ .Values.nginx.clientMaxBodySize }};
        }
      }
    }
{{- end }}
