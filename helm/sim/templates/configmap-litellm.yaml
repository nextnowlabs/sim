{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sim.fullname" . }}-litellm-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sim.litellm.labels" . | nindent 4 }}
data:
  litellm_config.yaml: |
    model_list:
    {{- range .Values.litellm.modelList }}
      - model_name: {{ .modelName | quote }}
        litellm_params:
          model: {{ printf "%s/%s" .provider .model | quote }}
          {{- if .apiKeyEnv }}
          api_key: {{ printf "os.environ/%s" .apiKeyEnv | quote }}
          {{- end }}
          {{- if .apiBase }}
          api_base: {{ .apiBase | quote }}
          {{- end }}
          {{- if .rpm }}
          rpm: {{ .rpm }}
          {{- end }}
          {{- if .tpm }}
          tpm: {{ .tpm }}
          {{- end }}
          {{- if .maxRetries }}
          num_retries: {{ .maxRetries }}
          {{- end }}
          {{- with .extraParams }}
          {{- range $key, $value := . }}
          {{ $key }}: {{ $value | quote }}
          {{- end }}
          {{- end }}
    {{- end }}
    general_settings:
      {{- if .Values.litellm.config.masterKey }}
      master_key: {{ .Values.litellm.config.masterKey | quote }}
      {{- end }}
    {{- with .Values.litellm.config.extraSettings }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}